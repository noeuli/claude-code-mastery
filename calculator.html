<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>кі„мӮ°кё°</title>
  <style>
    /* CSS GridлЎң лІ„нҠјмқ„ 4м—ҙ л°°м№ҳ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    /* л””мҠӨн”Ңл Ҳмқҙ мҳҒм—ӯ */
    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
    }
    .display .expression {
      color: #7fa8c9;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .display .result {
      color: #e0e0e0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* CSS Grid: 4м—ҙлЎң лІ„нҠј л°°м№ҳ */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    button:active { transform: scale(0.93); }

    .btn-num  { background: #1a1a4e; color: #e0e0e0; }
    .btn-num:hover  { background: #252560; }
    .btn-op   { background: #0f3460; color: #7fa8c9; }
    .btn-op:hover   { background: #144080; }
    .btn-eq   { background: #e94560; color: white; font-size: 22px; }
    .btn-eq:hover   { background: #ff5577; }
    .btn-clear { background: #533483; color: #e0e0e0; }
    .btn-clear:hover { background: #6a42a8; }

    /* 0 лІ„нҠјмқҖ 2м№ё м°Ём§Җ */
    .span2 { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <!-- нҳ„мһ¬ мҲҳмӢқмқ„ ліҙм—¬мЈјлҠ” мһ‘мқҖ мӨ„ -->
      <div class="expression" id="expression"></div>
      <!-- нҳ„мһ¬ мһ…л Ҙк°’ лҳҗлҠ” кІ°кіј -->
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <!-- н–ү 1: кё°лҠҘ лІ„нҠј -->
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="toggleSign()">+/-</button>
      <button class="btn-clear" onclick="percent()">%</button>
      <button class="btn-op"    onclick="setOp('/')">Г·</button>

      <!-- н–ү 2~4: мҲ«мһҗ + м—°мӮ°мһҗ -->
      <button class="btn-num" onclick="input('7')">7</button>
      <button class="btn-num" onclick="input('8')">8</button>
      <button class="btn-num" onclick="input('9')">9</button>
      <button class="btn-op"  onclick="setOp('*')">Г—</button>

      <button class="btn-num" onclick="input('4')">4</button>
      <button class="btn-num" onclick="input('5')">5</button>
      <button class="btn-num" onclick="input('6')">6</button>
      <button class="btn-op"  onclick="setOp('-')">вҲ’</button>

      <button class="btn-num" onclick="input('1')">1</button>
      <button class="btn-num" onclick="input('2')">2</button>
      <button class="btn-num" onclick="input('3')">3</button>
      <button class="btn-op"  onclick="setOp('+')">+</button>

      <!-- н–ү 5: 0(2м№ё), мҶҢмҲҳм җ, = -->
      <button class="btn-num span2" onclick="input('0')">0</button>
      <button class="btn-num"       onclick="inputDot()">.</button>
      <button class="btn-eq"        onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    /*
     * кі„мӮ°кё° мғҒнғң (State)
     * - current  : нҳ„мһ¬ нҷ”л©ҙм—җ ліҙмқҙлҠ” мҲ«мһҗ (л¬ёмһҗм—ҙ)
     * - prev     : м—°мӮ°мһҗ лҲ„лҘҙкё° м „м—җ м ҖмһҘн•ң мҲ«мһҗ
     * - op       : м„ нғқлҗң м—°мӮ°мһҗ ('+', '-', '*', '/')
     * - resetNext: лӢӨмқҢ мҲ«мһҗ мһ…л Ҙ мӢң currentлҘј мҙҲкё°нҷ”н• м§Җ м—¬л¶Җ
     */
    let current   = '0';
    let prev      = null;
    let op        = null;
    let resetNext = false;

    const resultEl = document.getElementById('result');
    const exprEl   = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = current;
    }

    /* мҲ«мһҗ лІ„нҠј мһ…л Ҙ */
    function input(val) {
      if (resetNext) {
        current = val;      // мғҲ мҲ«мһҗ мһ…л Ҙ мӢңмһ‘
        resetNext = false;
      } else {
        current = current === '0' ? val : current + val;
      }
      updateDisplay();
    }

    /* мҶҢмҲҳм җ мһ…л Ҙ (мӨ‘ліө л°©м§Җ) */
    function inputDot() {
      if (resetNext) { current = '0.'; resetNext = false; }
      else if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    /* м—°мӮ°мһҗ м„ нғқ */
    function setOp(o) {
      // мқҙлҜё м—°мӮ°мһҗк°Җ мһҲмңјл©ҙ мӨ‘к°„ кі„мӮ° лЁјм Җ мҲҳн–ү (м—°мҮ„ кі„мӮ°)
      if (op && !resetNext) calculate(true);
      prev = parseFloat(current);
      op   = o;
      resetNext = true;
      const sym = { '+': '+', '-': 'вҲ’', '*': 'Г—', '/': 'Г·' }[o];
      exprEl.textContent = `${prev} ${sym}`;
    }

    /* = лІ„нҠј: мөңмў… кі„мӮ° */
    function calculate(chain = false) {
      if (op === null || prev === null) return;
      const cur = parseFloat(current);
      let res;
      switch (op) {
        case '+': res = prev + cur; break;
        case '-': res = prev - cur; break;
        case '*': res = prev * cur; break;
        case '/': res = cur === 0 ? 'Error' : prev / cur; break;
      }
      const sym = { '+': '+', '-': 'вҲ’', '*': 'Г—', '/': 'Г·' }[op];
      if (!chain) exprEl.textContent = `${prev} ${sym} ${cur} =`;
      current   = res === 'Error' ? 'Error' : String(parseFloat(res.toFixed(10)));
      if (!chain) { prev = null; op = null; }
      resetNext = true;
      updateDisplay();
    }

    /* AC: м „мІҙ мҙҲкё°нҷ” */
    function clearAll() {
      current = '0'; prev = null; op = null; resetNext = false;
      exprEl.textContent = '';
      updateDisplay();
    }

    /* +/- л¶Җнҳё м „нҷҳ */
    function toggleSign() {
      current = String(parseFloat(current) * -1);
      updateDisplay();
    }

    /* % нҚјм„јнҠё ліҖнҷҳ */
    function percent() {
      current = String(parseFloat(current) / 100);
      updateDisplay();
    }
  </script>
</body>
</html>
